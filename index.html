<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HexHounds Game Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Spray+Paint&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, rgba(180, 0, 255, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(57, 255, 20, 0.18), transparent 25%),
        linear-gradient(180deg, #050505 0%, #0b0b0f 50%, #050505 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: 0.18;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 18px 40px;
      position: relative;
      z-index: 1;
    }

.title {
  text-align: center;
  margin: 20px 0 40px;
  font-size: clamp(52px, 9vw, 108px);
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #fff;
  font-family: "Rubik Spray Paint", system-ui;
  background: linear-gradient(90deg, #39ff14, #ff40d6, #b86bff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:
    0 0 10px rgba(57,255,20,0.2),
    0 0 20px rgba(255,64,214,0.2),
    0 0 35px rgba(184,107,255,0.15);
  transform: rotate(-1deg);
}

    .subtitle {
      text-align: center;
      margin-top: -20px;
      margin-bottom: 30px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .arena {
      display: grid;
      grid-template-columns: 1fr 320px 1fr;
      gap: 28px;
      align-items: start;
    }

    .team-card {
      background: rgba(0,0,0,0.45);
      border-radius: 26px;
      padding: 22px;
      backdrop-filter: blur(6px);
      min-height: 360px;
    }

    .team-a {
      border: 2px solid rgba(57, 255, 20, 0.85);
      box-shadow: 0 0 24px rgba(57,255,20,0.18);
    }

    .team-b {
      border: 2px solid rgba(255, 64, 214, 0.85);
      box-shadow: 0 0 24px rgba(255,64,214,0.18);
    }

    .team-name {
      text-align: center;
      margin: 0 0 18px;
      font-size: 42px;
      text-transform: uppercase;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      letter-spacing: 2px;
    }

    .team-a .team-name {
      color: #7dff68;
      text-shadow: 0 0 10px rgba(57,255,20,0.5);
    }

    .team-b .team-name {
      color: #ff7be8;
      text-shadow: 0 0 10px rgba(255,64,214,0.5);
    }

    .player-list {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .player {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(0,0,0,0.35);
      font-size: 24px;
      font-weight: bold;
      text-align: left;
    }

    .score-box {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 18px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .score-label {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 48px;
      font-weight: 900;
    }

    .team-a .score-value {
      color: #7dff68;
      text-shadow: 0 0 12px rgba(57,255,20,0.35);
    }

    .team-b .score-value {
      color: #ff7be8;
      text-shadow: 0 0 12px rgba(255,64,214,0.35);
    }

    .center-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding-top: 28px;
    }

    .buzzer-wrap {
      position: relative;
      width: 230px;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buzzer-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: linear-gradient(90deg, #39ff14, #ff9a2f, #ff40d6);
      filter: blur(18px);
      opacity: 0.95;
    }

    .buzzer {
      position: relative;
      z-index: 2;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 10px solid #ffca8a;
      background: linear-gradient(180deg, #ff5a5a 0%, #d71313 100%);
      color: white;
      font-size: 52px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        inset 0 10px 18px rgba(255,255,255,0.18),
        0 16px 40px rgba(255,0,0,0.28);
      transition: transform 0.12s ease, opacity 0.2s ease;
    }

    .buzzer:hover {
      transform: scale(1.03);
    }

    .buzzer:active {
      transform: scale(0.97);
    }

    .buzzer:disabled {
      cursor: not-allowed;
      background: linear-gradient(180deg, #777 0%, #4d4d4d 100%);
      border-color: #999;
      opacity: 0.9;
    }

    .first-buzz {
      width: 100%;
      background: rgba(0,0,0,0.52);
      border: 2px solid rgba(57,255,20,0.3);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 22px rgba(57,255,20,0.08);
    }

    .first-buzz-label {
      font-size: 18px;
      color: #7dff68;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .first-buzz-name {
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .first-buzz-team {
      font-size: 28px;
      color: #7dff68;
      font-weight: 800;
    }

    .timer-card {
      width: 100%;
      background: rgba(0,0,0,0.52);
      border: 2px solid rgba(255,64,214,0.32);
      border-radius: 24px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 0 22px rgba(255,64,214,0.08);
    }

    .timer-label {
      font-size: 14px;
      color: rgba(255,255,255,0.58);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .timer-value {
      font-size: 56px;
      color: #7dff68;
      font-weight: 900;
      text-shadow: 0 0 14px rgba(57,255,20,0.28);
    }

    @media (max-width: 1100px) {
      .arena {
        grid-template-columns: 1fr;
      }

      .center-column {
        order: 3;
        padding-top: 0;
      }

      .team-card {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 12px 30px;
      }

      .team-name {
        font-size: 34px;
      }

      .player {
        font-size: 20px;
      }

      .buzzer-wrap {
        width: 190px;
        height: 190px;
      }

      .buzzer {
        width: 165px;
        height: 165px;
        font-size: 42px;
      }

      .first-buzz-name {
        font-size: 36px;
      }

      .timer-value {
        font-size: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title">HexHounds</div>
    <div class="subtitle">Community Game Night</div>

    <div class="arena">
      <div class="team-card team-a">
        <h2 class="team-name" id="teamAName">Team Hexx</h2>
        <div class="player-list" id="teamAPlayers">
          <div class="player">Sora</div>
          <div class="player">HexxKitty</div>
          <div class="player">BlowShocker</div>
          <div class="player">Nerve</div>
        </div>
        <div class="score-box">
          <div class="score-label">Score</div>
          <div class="score-value" id="scoreA">3</div>
        </div>
      </div>

      <div class="center-column">
        <div class="buzzer-wrap">
          <div class="buzzer-glow"></div>
          <button class="buzzer" id="buzzButton">BUZZ</button>
        </div>

        <div class="first-buzz">
          <div class="first-buzz-label">First Buzz</div>
          <div class="first-buzz-name" id="buzzName">Sora</div>
          <div class="first-buzz-team" id="buzzTeam">Team Hexx</div>
        </div>

        <div class="timer-card">
          <div class="timer-label">Round Timer</div>
          <div class="timer-value" id="timerValue">00:30</div>
        </div>
      </div>

      <div class="team-card team-b">
        <h2 class="team-name" id="teamBName">Team Toxx</h2>
        <div class="player-list" id="teamBPlayers">
          <div class="player">Justan</div>
          <div class="player">Brother Dude</div>
          <div class="player">Goblin</div>
          <div class="player">BlueDog</div>
        </div>
        <div class="score-box">
          <div class="score-label">Score</div>
          <div class="score-value" id="scoreB">2</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let buzzerLocked = false;
    let timeLeft = 30;
    let timerRunning = false;

    const buzzButton = document.getElementById("buzzButton");
    const buzzName = document.getElementById("buzzName");
    const buzzTeam = document.getElementById("buzzTeam");
    const timerValue = document.getElementById("timerValue");

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
    }

    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;

      const interval = setInterval(() => {
        timeLeft--;
        timerValue.textContent = formatTime(timeLeft);

        if (timeLeft <= 0) {
          clearInterval(interval);
          timerRunning = false;
        }
      }, 1000);
    }

    buzzButton.addEventListener("click", function () {
      if (buzzerLocked) return;

      buzzerLocked = true;
      buzzButton.disabled = true;
      buzzButton.textContent = "LOCKED";
      buzzName.textContent = "Someone";
      buzzTeam.textContent = "Buzzed First";
    });

    timerValue.textContent = formatTime(timeLeft);
  </script>
</body>
</html>
