<!DOCTYPE html>
<html>
<head>

<title>HexHounds Game Night</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:#39ff14;
font-size:48px;
margin-bottom:40px;
}

.container{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}

.team{
border:2px solid #39ff14;
border-radius:20px;
padding:20px;
width:300px;
margin:10px;
}

.players{
margin-top:10px;
min-height:80px;
}

.buzzer{
margin-top:40px;
font-size:40px;
padding:30px 60px;
border-radius:100px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.buzzer:disabled{
background:#555;
cursor:not-allowed;
}

.result{
margin-top:30px;
font-size:28px;
color:#39ff14;
}

.timer{
margin-top:20px;
font-size:32px;
}

</style>

</head>

<body>

<h1>HEXHOUNDS</h1>

<div class="container">

<div class="team">
<h2 id="teamAname">Team A</h2>
<div class="players" id="teamAplayers"></div>
<h3>Score: <span id="scoreA">0</span></h3>
</div>

<div class="team">
<h2 id="teamBname">Team B</h2>
<div class="players" id="teamBplayers"></div>
<h3>Score: <span id="scoreB">0</span></h3>
</div>

</div>

<button class="buzzer" id="buzzButton">BUZZ</button>

<div class="result" id="buzzResult"></div>

<div class="timer" id="timer">30</div>

<script>

let buzzerLocked=false
let timer=30
let timerRunning=false

const buzzButton=document.getElementById("buzzButton")
const buzzResult=document.getElementById("buzzResult")
const timerDisplay=document.getElementById("timer")

buzzButton.onclick=()=>{

if(buzzerLocked)return

buzzerLocked=true

buzzResult.innerText="Someone Buzzed First!"

buzzButton.disabled=true

}

function startTimer(){

if(timerRunning)return

timerRunning=true

const interval=setInterval(()=>{

timer--

timerDisplay.innerText=timer

if(timer<=0){

clearInterval(interval)

timerRunning=false

}

},1000)

}

</script>

</body>

</html>
